{% extends 'base.html' %}
{% block content %}
<div class="auth-wrapper">
    <div class="container d-flex align-items-center justify-content-center flex-grow-1" style="padding-top: 40px; padding-bottom: 40px;">
        <div class="col-md-6">
            <div class="auth-card p-4">
                <h2 class="mb-4">Editar Estadísticas</h2>
                {% if error %}
                    <div class="alert alert-danger">{{ error }}</div>
                {% endif %}
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label auth-label">Goles</label>
                        <input type="number" name="goles" class="form-control auth-input" value="{{ estadistica['goles'] if estadistica else 0 }}" min="0">
                    </div>
                    <div class="mb-3">
                        <label class="form-label auth-label">Asistencias</label>
                        <input type="number" name="asistencias" class="form-control auth-input" value="{{ estadistica['asistencias'] if estadistica else 0 }}" min="0">
                    </div>
                    <div class="mb-3">
                        <label class="form-label auth-label">Efectividad de pases (%)</label>
                        <input type="number" name="efectividad_pases" class="form-control auth-input" value="{{ estadistica['efectividad_pases'] if estadistica else 0 }}" min="0" max="100">
                    </div>
                    <div class="mb-3">
                        <label class="form-label auth-label">Faltas</label>
                        <input type="number" name="faltas" class="form-control auth-input" value="{{ estadistica['faltas'] if estadistica else 0 }}" min="0">
                    </div>
                    <div class="mb-3">
                        <label class="form-label auth-label">Tarjetas amarillas</label>
                        <input type="number" name="tarj_amarillas" class="form-control auth-input" value="{{ estadistica['tarj_amarillas'] if estadistica else 0 }}" min="0">
                    </div>
                    <div class="mb-3">
                        <label class="form-label auth-label">Tarjetas rojas</label>
                        <input type="number" name="tarj_rojas" class="form-control auth-input" value="{{ estadistica['tarj_rojas'] if estadistica else 0 }}" min="0">
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-auth-submit">Guardar</button>
                        <a href="/jugadores/detalle/{{ jugador_id }}" class="btn btn-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
