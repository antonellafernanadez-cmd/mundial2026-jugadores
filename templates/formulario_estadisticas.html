{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-6">
        <div class="card p-4">
            <h2 class="mb-4">Editar Estadísticas</h2>
            {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
            {% endif %}
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Goles</label>
                    <input type="number" name="goles" class="form-control" value="{{ estadistica['goles'] if estadistica else 0 }}" min="0">
                </div>
                <div class="mb-3">
                    <label class="form-label">Asistencias</label>
                    <input type="number" name="asistencias" class="form-control" value="{{ estadistica['asistencias'] if estadistica else 0 }}" min="0">
                </div>
                <div class="mb-3">
                    <label class="form-label">Efectividad de pases (%)</label>
                    <input type="number" name="efectividad_pases" class="form-control" value="{{ estadistica['efectividad_pases'] if estadistica else 0 }}" min="0" max="100">
                </div>
                <div class="mb-3">
                    <label class="form-label">Faltas</label>
                    <input type="number" name="faltas" class="form-control" value="{{ estadistica['faltas'] if estadistica else 0 }}" min="0">
                </div>
                <div class="mb-3">
                    <label class="form-label">Tarjetas amarillas</label>
                    <input type="number" name="tarj_amarillas" class="form-control" value="{{ estadistica['tarj_amarillas'] if estadistica else 0 }}" min="0">
                </div>
                <div class="mb-3">
                    <label class="form-label">Tarjetas rojas</label>
                    <input type="number" name="tarj_rojas" class="form-control" value="{{ estadistica['tarj_rojas'] if estadistica else 0 }}" min="0">
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Guardar</button>
                    <a href="/jugadores/detalle/{{ jugador_id }}" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
