{% extends 'base.html' %}

{% block content %}
<div class="auth-wrapper">
    
    <div class="container d-flex align-items-center justify-content-center flex-grow-1" style="padding-top: 40px; padding-bottom: 40px;">
        <div class="auth-card text-center">
            
            <div class="auth-icon-header">
                <i class="bi bi-person-plus-fill"></i>
            </div>
            
            <h2>Crear cuenta</h2>
            <p class="subtitle mb-4">Únete a nuestra comunidad</p>
            
            <form action="{{ url_for('users_bp.register') }}" method="POST" class="text-start"></form>
                
                <div class="row g-3 mb-3">
                    <div class="col-md-6 col-12">
                        <label class="form-label auth-label">Nombre de usuario</label>
                        <input type="text" name="username" class="form-control auth-input" placeholder="Tu usuario" required>
                    </div>
                    <div class="col-md-6 col-12">
                        <label class="form-label auth-label">Correo electrónico</label>
                        <input type="email" name="email" class="form-control auth-input" placeholder="ejemplo@correo.com" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label auth-label">Contraseña</label>
                    <input type="password" name="password" class="form-control auth-input" placeholder="Crea una contraseña" required>
                </div>

                <div class="mb-3">
                    <label class="form-label auth-label">Confirmar contraseña</label>
                    <input type="password" name="confirm_password" class="form-control auth-input" placeholder="Repite tu contraseña" required>
                </div>

                <div class="mb-3">
                    <label class="form-label auth-label">Rol</label>
                    <select name="role" class="form-select auth-input">
                        <option value="user" selected>Usuario</option>
                        <option value="admin">Administrador</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-auth-submit w-100 mb-3 d-flex align-items-center justify-content-center gap-2">
                    Registrarse <i class="bi bi-person-plus fs-5"></i>
                </button>

                <div class="text-center mt-3">
                    <span class="text-secondary small">¿Ya tenés cuenta? </span>
                    <a href="{{ url_for('routes_auth.login') }}" class="auth-footer-link small">Iniciá sesión aquí</a>
                </div>

            </form>
        </div>
    </div>

</div>
{% endblock %}
