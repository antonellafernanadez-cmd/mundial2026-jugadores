{% extends 'base.html' %}
{% block content %}
<div class="auth-wrapper">
    <div class="container d-flex align-items-center justify-content-center flex-grow-1" style="padding-top: 40px; padding-bottom: 40px;">
        <div class="col-md-6">
            <div class="auth-card p-4">
                <h2 class="mb-4">{{ 'Editar Jugador' if jugador else 'Agregar Jugador' }}</h2>
                {% if error %}
                    <div class="alert alert-danger">{{ error }}</div>
                {% endif %}
                <form method="POST" novalidate>
                    <div class="mb-3">
                        <label class="form-label auth-label">Nombre</label>
                        <input type="text" name="nombre" class="form-control auth-input" placeholder="Campo obligatorio" value="{{ jugador.nombre if jugador else '' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label auth-label">Edad</label>
                        <input type="number" name="edad" class="form-control auth-input" placeholder="Debe ser mayor a 16 años" value="{{ jugador.edad if jugador else '' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label auth-label">Número de camiseta</label>
                        <input type="number" name="num_camiseta" class="form-control auth-input" placeholder="Debe ser entre 1 y 99" value="{{ jugador.num_camiseta if jugador else '' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label auth-label">Tipo</label>
                        <select name="tipo" class="form-control auth-input">
                            <option value="arquero" {% if jugador and jugador.tipo == 'arquero' %}selected{% endif %}>Arquero</option>
                            <option value="defensor" {% if jugador and jugador.tipo == 'defensor' %}selected{% endif %}>Defensor</option>
                            <option value="mediocampista" {% if jugador and jugador.tipo == 'mediocampista' %}selected{% endif %}>Mediocampista</option>
                            <option value="delantero" {% if jugador and jugador.tipo == 'delantero' %}selected{% endif %}>Delantero</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label auth-label">Selección</label>
                        <select name="seleccion_id" class="form-control auth-input">
                            {% for seleccion in selecciones %}
                                <option value="{{ seleccion.id }}" {% if jugador and jugador.seleccion_id == seleccion.id %}selected{% endif %}>{{ seleccion.pais }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-auth-submit">Guardar</button>
                        <a href="/jugadores/ver_jugadores" class="btn btn-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
