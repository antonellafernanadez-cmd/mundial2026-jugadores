{% extends 'base.html' %}

{% block content %}
<div class="auth-wrapper">
    
    <div class="container d-flex align-items-center justify-content-center flex-grow-1" style="padding-top: 40px; padding-bottom: 40px;">
        <div class="auth-card text-center">
            
            <div class="auth-icon-header">
                <i class="bi bi-shield-lock-fill"></i>
            </div>
            
            <h2>Iniciar sesión</h2>
            <p class="subtitle mb-4">Bienvenido/a</p>
            
            <form action="{{ url_for('routes_auth.login') }}" method="POST" class="text-start">
                
                <div class="mb-3">
                    <label class="form-label auth-label">Correo electrónico</label>
                    <input type="email" name="email" class="form-control auth-input" placeholder="ejemplo@correo.com" required>
                </div>

                <div class="mb-3">
                    <label class="form-label auth-label">Contraseña</label>
                    <input type="password" name="password" class="form-control auth-input" placeholder="Tu contraseña" required>
                </div>

                <button type="submit" class="btn btn-auth-submit w-100 mb-3 d-flex align-items-center justify-content-center gap-2">
                    Iniciar sesión <i class="bi bi-box-arrow-in-right fs-5"></i>
                </button>

                <div class="text-center mt-2">
                    <span class="text-secondary small">¿No tenés cuenta? </span>
                    <a href="{{ url_for('users_bp.register') }}" class="auth-footer-link small">Regístrate aquí</a>
                </div>

            </form>
        </div>
    </div>

</div>
{% endblock %}
